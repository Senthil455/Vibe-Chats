version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: vibeschat_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vibeschat
    networks:
      - vibeschat_net

  redis:
    image: redis:7.2-alpine
    container_name: vibeschat_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - vibeschat_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibeschat_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/vibeschat
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - vibeschat_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vibeschat_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - vibeschat_net

volumes:
  mongo_data:
  redis_data:

networks:
  vibeschat_net:
    driver: bridge
